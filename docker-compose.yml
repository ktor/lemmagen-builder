services:

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PLUGIN_ZIP: elasticsearch-analysis-lemmagen-8.18.4-plugin.zip
    image: elasticsearch-lemmagen-sk:8.18.4
    container_name: es-lemmagen-sk
    environment:
      - node.name=es-lemmagen-sk
      - cluster.name=lemmagen-test-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - esdata:/usr/share/elasticsearch/data
      # Hot-reload lexikonu bez rebuildu image (volitelne pre vyvoj)
      - ./config/lemmagen:/usr/share/elasticsearch/config/lemmagen:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - esnet

  # Volitelne - Kibana pre manualnu inspecciu
  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.0
    container_name: kibana-lemmagen
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - kibana
    networks:
      - esnet

volumes:
  esdata:
    driver: local

networks:
  esnet:
    driver: bridge
